name: Deploy to Coolify

on:
  push:
    branches:
      - main
  schedule:
    # 04:10 Asia/Shanghai, daily. GitHub Actions cron uses UTC.
    - cron: "10 20 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-coolify
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail

          test -n "$COOLIFY_BASE_URL"
          test -n "$COOLIFY_TOKEN"
          test -n "$COOLIFY_APP_UUID"

          curl --fail --show-error --silent --request GET \
            "${COOLIFY_BASE_URL%/}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}"
